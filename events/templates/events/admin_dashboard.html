{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="mb-10">
  <p class="text-sm tracking-widest text-gray-400 uppercase">Dashboard</p>
  <h1 class="mt-3 text-4xl font-bold tracking-tight">
    <span class="text-red-400">Admin</span> <span class="text-gray-100">Dashboard</span>
  </h1>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
  <div class="border border-white/10 bg-white/5 rounded p-5">
    <p class="text-gray-400 text-sm">Total Events</p>
    <p class="text-3xl font-bold text-gray-100 mt-2">{{ total_events }}</p>
  </div>
  <div class="border border-white/10 bg-white/5 rounded p-5">
    <p class="text-gray-400 text-sm">Total Categories</p>
    <p class="text-3xl font-bold text-gray-100 mt-2">{{ total_categories }}</p>
  </div>
  <div class="border border-white/10 bg-white/5 rounded p-5">
    <p class="text-gray-400 text-sm">Total Users</p>
    <p class="text-3xl font-bold text-gray-100 mt-2">{{ total_users }}</p>
  </div>
</div>
{% endblock %}
